name: Bug Report
description: Report a bug in PeekAPI (dashboard, SDKs, or ingestion)
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of PeekAPI is affected?
      options:
        - Dashboard
        - SDK — Node.js
        - SDK — Python
        - SDK — Go
        - SDK — Ruby
        - SDK — PHP
        - SDK — Rust
        - Ingestion
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SDK / Package Version
      description: Run `npm list @peekapi/sdk-node`, `pip show peekapi`, etc.
      placeholder: e.g. 1.2.0
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet to reproduce the issue.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Runtime, OS, framework version — anything relevant."
      placeholder: |
        Node.js 20.11, Express 4.18, macOS 14.3
    validations:
      required: false
